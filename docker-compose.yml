version: '3.8'

services:
  web:
    build: .
    container_name: php_web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.6
    container_name: mariadb-mvc
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # <- agrega esto

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-mvc
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mariadb

volumes:
  mariadb_data: